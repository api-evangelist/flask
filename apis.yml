aid: flask
name: Flask
description: >-
  Flask is a lightweight WSGI web application framework for Python, designed
  to make getting started quick and easy with the ability to scale up to
  complex applications. It provides a simple core with Jinja2 templating and
  Werkzeug WSGI toolkit, and is extensible through a rich ecosystem of
  extensions for database integration, form validation, authentication, and
  more.
